name: CI — Web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web (lint / test / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: network-monitor-web

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: network-monitor-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build
        env:
          # Fallback values keep the build passing in CI without real secrets.
          # These are not used at runtime — they are only referenced client-side via SWR.
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_WEB_API_KEY: ci-placeholder-key
