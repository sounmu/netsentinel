version: "3.8"

services:
  # 1. PostgreSQL + TimescaleDB — no host port exposed; reachable only on the internal network
  db:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-network_monitor}
    networks:
      - backend-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-network_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # 2. Rust backend server
  server:
    build:
      context: ./network-monitor-server
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./network-monitor-server/.env:/app/.env
      - ./network-monitor-server/config.yaml:/app/config.yaml
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-network_monitor}
    networks:
      - shared-network
      - backend-internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  # 3. Next.js frontend (standalone build)
  web:
    build:
      context: ./network-monitor-web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
        - NEXT_PUBLIC_WEB_API_KEY=${NEXT_PUBLIC_WEB_API_KEY:-default_web_api_key}
    depends_on:
      - server
    restart: unless-stopped
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    networks:
      - shared-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M


networks:
  # shared-network is expected to be created externally (e.g. by a Cloudflare Tunnel container).
  # Create it with: docker network create shared-network
  shared-network:
    external: true
  backend-internal:
